name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  issues: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov allure-pytest

      # Persist mutating gate state (flake history + metrics history) across runs.
      # A unique key saves a fresh cache each run; restore-keys pulls the most
      # recent previous one. Without this, flake windows and the metrics trend
      # would reset every run.
      - name: Restore gate state
        uses: actions/cache@v4
        with:
          path: |
            gate-history.db
            metrics-history.json
          key: gate-state-${{ github.run_id }}
          restore-keys: gate-state-

      # Produce junit.xml + coverage.xml + Allure results. Do NOT fail the job on
      # a test failure — the gate is the decision-maker and needs the report.
      - name: Run tests
        continue-on-error: true
        run: >
          pytest --alluredir=allure-results
          --junitxml=junit.xml
          --cov=quality_gate --cov-report=xml:coverage.xml

      # The gate decides pass/fail and exits non-zero on FAIL, turning the PR
      # check red. Triage runs offline (fake) so CI is green without secrets.
      # Triage uses OpenAI when --provider openai is set. To enable it in CI, add
      # an OPENAI_API_KEY repository secret; it is already exposed on this step.
      - name: Quality gate
        run: |
          python -m quality_gate \
            --junit junit.xml \
            --coverage coverage.xml \
            --history gate-history.db \
            --report gate-report.json \
            --triage --provider fake \
            --triage-report triage-report.json \
            --allure-dir allure-results \
            --metrics-history metrics-history.json \
            --trend-report allure-results/metrics-trend.html

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-reports
          path: |
            junit.xml
            coverage.xml
            gate-report.json
            triage-report.json
            allure-results

      # File remediation tickets as GitHub Issues (deduped). Runs even if the gate
      # failed, so the failures that blocked the PR get tickets.
      - name: File remediation tickets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m quality_gate.issues triage-report.json

  # Publishes the Allure report (with historical trends) + the metrics-trend page
  # to GitHub Pages. Only on pushes to the default branch — not on PRs.
  # SETUP (one-time): enable GitHub Pages for the repo with source = gh-pages
  # branch. The gh-pages branch is created automatically on the first run.
  # Community actions are pinned loosely; verify versions on first use.
  publish-dashboard:
    needs: quality-gate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push to gh-pages
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: quality-gate-reports
          path: reports

      - name: Generate Allure report (merging history)
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: reports/allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Include the metrics-trend page
        run: cp reports/allure-results/metrics-trend.html allure-history/ 2>/dev/null || true

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
