name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  issues: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      # Persist flake history across runs. A unique key saves a fresh cache each
      # run; restore-keys pulls the most recent previous one — the canonical way
      # to carry a mutating file forward. Without this, flake detection would
      # start from an empty window every run.
      - name: Restore flake history
        uses: actions/cache@v4
        with:
          path: gate-history.db
          key: flake-history-${{ github.run_id }}
          restore-keys: flake-history-

      # Produce junit.xml + coverage.xml. Do NOT fail the job on a test failure —
      # the gate is the decision-maker and needs the report even when tests fail.
      - name: Run tests
        continue-on-error: true
        run: pytest --junitxml=junit.xml --cov=quality_gate --cov-report=xml:coverage.xml

      # The gate decides pass/fail and exits non-zero on FAIL, turning the PR
      # check red. Triage runs offline (fake). To use real Claude, set
      # --provider claude and add ANTHROPIC_API_KEY as a repository secret
      # (exposed here as an env var).
      - name: Quality gate
        run: |
          python -m quality_gate \
            --junit junit.xml \
            --coverage coverage.xml \
            --history gate-history.db \
            --report gate-report.json \
            --triage --provider fake \
            --triage-report triage-report.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-reports
          path: |
            junit.xml
            coverage.xml
            gate-report.json
            triage-report.json

      # File remediation tickets as GitHub Issues (deduped). Runs even if the gate
      # failed, so the failures that blocked the PR get tickets.
      - name: File remediation tickets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m quality_gate.issues triage-report.json
